name: Docker Build (Release)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Production)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-app-builder:latest,ai-app-builder:1.0.0
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## ✅ Docker Production Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built successfully:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ai-app-builder:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ai-app-builder:1.0.0\`" >> $GITHUB_STEP_SUMMARY
