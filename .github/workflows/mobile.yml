name: Build Mobile Apps

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: npm ci
      - run: npx cap add android || true
      - run: npx cap sync android
      
      # 配置签名
      - name: Setup Signing
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/universal.keystore
          cat > android/keystore.properties << EOF
          storeFile=universal.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF
      
      - name: Build Android APK (Signed)
        working-directory: android
        run: ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-signed
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
      
      # 上传到 Nightly.link
      - name: Upload to Nightly
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-android
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx cap add ios || true
      - run: npx cap sync ios
      - name: Build iOS
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -destination 'platform=iOS Simulator,name=iPhone 15' build
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/*.app
          retention-days: 7
