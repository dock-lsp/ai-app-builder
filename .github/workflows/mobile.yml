name: Build Mobile Apps (Release)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: npm ci
      - name: Build Web App
        run: npm run build:prod
        env:
          NODE_ENV: production
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
      - name: Sync Capacitor Android
        run: npx cap sync android
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      - name: Build Android Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build Web App
        run: npm run build:prod
        env:
          NODE_ENV: production
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
      - name: Sync Capacitor iOS
        run: npx cap sync ios
      - name: Build iOS Simulator
        working-directory: ios/App
        run: |
          # 使用任意可用的iOS模拟器
          SIMULATOR=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone.*\([0-9A-F-]+\)' | head -1)
          echo "Using simulator: $SIMULATOR"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath build \
            build 2>/dev/null || \
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            build 2>/dev/null || \
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            build
      - name: Find and Package iOS App
        run: |
          APP_PATH=$(find ios/App/build/Build/Products -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/ios-app.zip" *.app
            ls -lh "$GITHUB_WORKSPACE/ios-app.zip"
          else
            echo "No .app found"
            find ios/App/build -type d 2>/dev/null | head -20
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-release
          path: ios-app.zip
          retention-days: 30
          if-no-files-found: error

  build-harmony:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build Web App for HarmonyOS
        run: npm run build:prod
        env:
          NODE_ENV: production
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
      - name: Setup HarmonyOS Project
        run: |
          mkdir -p harmony/entry/src/main/resources/base/profile
          mkdir -p harmony/entry/src/main/ets
          mkdir -p harmony/entry/src/main/resources/rawfile
          cp -r dist/* harmony/entry/src/main/resources/rawfile/ || true
      - name: Create HarmonyOS Config
        run: |
          cat > harmony/build-profile.json5 << 'EOF'
          {
            "app": {
              "signingConfigs": [],
              "compileSdkVersion": 9,
              "compatibleSdkVersion": 9,
              "products": [{
                "name": "default",
                "signingConfig": "default"
              }]
            },
            "modules": [{
              "name": "entry",
              "srcPath": "./entry",
              "targets": [{
                "name": "default",
                "applyToProducts": ["default"]
              }]
            }]
          }
          EOF
          cat > harmony/entry/src/main/module.json5 << 'EOF'
          {
            "module": {
              "name": "entry",
              "type": "entry",
              "abilities": [{
                "name": "EntryAbility",
                "srcEntry": "./ets/entryability/EntryAbility.ts",
                "description": "AI App Builder",
                "icon": "$media:icon",
                "label": "$string:EntryLabel",
                "launchType": "standard",
                "visible": true
              }]
            }
          }
          EOF
      - name: Create HarmonyOS Entry Ability
        run: |
          mkdir -p harmony/entry/src/main/ets/entryability
          cat > harmony/entry/src/main/ets/entryability/EntryAbility.ts << 'EOF'
          import UIAbility from '@ohos.app.ability.UIAbility';
          import window from '@ohos.window';
          
          export default class EntryAbility extends UIAbility {
            onCreate(want, launchParam) {
              console.info('EntryAbility onCreate');
            }
            onWindowStageCreate(windowStage) {
              windowStage.loadContent('pages/Index', (err, data) => {
                if (err.code) {
                  console.error('Failed to load content');
                  return;
                }
                console.info('Succeeded in loading content');
              });
            }
          }
          EOF
          mkdir -p harmony/entry/src/main/ets/pages
          cat > harmony/entry/src/main/ets/pages/Index.ets << 'EOF'
          @Entry
          @Component
          struct Index {
            build() {
              Column() {
                Web({ src: $rawfile('index.html'), controller: new WebController() })
                  .width('100%')
                  .height('100%')
              }
            }
          }
          EOF
      - name: Package HarmonyOS
        run: |
          cd harmony
          tar -czvf ../ai-app-builder-harmony.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: harmonyos-release
          path: ai-app-builder-harmony.tar.gz
          retention-days: 30
